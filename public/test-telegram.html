<!DOCTYPE html>
<html>
<head><title>Telegram Widget Test</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:40px;">
<h2>Telegram Login Widget Test</h2>
<p>If the button appears below, widget + domain are working.</p>
<hr>
<script async src="https://telegram.org/js/telegram-widget.js?23"
  data-telegram-login="Auth_lastproof_bot"
  data-size="large"
  data-onauth="onTelegramAuth(user)"
  data-request-access="write"></script>
<script>
function onTelegramAuth(user) {
  document.getElementById('result').innerText = JSON.stringify(user, null, 2);
  alert('Auth success! Username: ' + (user.username || 'none'));
}
</script>
<hr>
<pre id="result" style="color:#0f0;"></pre>
</body>
</html>
