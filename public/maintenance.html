<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Maintenance — LASTPROOF</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0b0f;
    color: #e5e7eb;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    padding: 24px;
  }
  .wrap { text-align: center; max-width: 480px; }
  .icon {
    width: 64px; height: 64px; margin: 0 auto 24px;
    border-radius: 50%;
    background: rgba(255,145,0,0.1);
    border: 2px solid #ff9100;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(255,145,0,0.2);
  }
  .eyebrow {
    font-size: 10px; letter-spacing: 0.18em;
    color: #ff9100; font-weight: 700; margin-bottom: 12px;
  }
  h1 {
    font-size: 28px; font-weight: 800; margin-bottom: 16px;
    letter-spacing: -0.02em;
    font-family: Inter, -apple-system, system-ui, sans-serif;
  }
  p { font-size: 13px; color: #6b7280; line-height: 1.7; margin-bottom: 32px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(255,145,0,0.06);
    border: 1px solid rgba(255,145,0,0.2);
    border-radius: 6px;
    font-size: 10px; letter-spacing: 0.12em; color: #ff9100;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ff9100;
    box-shadow: 0 0 6px rgba(255,145,0,0.6);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .footer { margin-top: 32px; font-size: 10px; color: #374151; letter-spacing: 0.1em; }
  .footer a { color: #4b5563; text-decoration: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ff9100" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
  </div>
  <div class="eyebrow">&gt; MAINTENANCE MODE</div>
  <h1>We'll be right back.</h1>
  <p>LASTPROOF is getting an upgrade. We're deploying new infrastructure to make proofs faster and more reliable. This won't take long.</p>
  <div class="badge">
    <span class="dot"></span>
    DEPLOYING UPDATES
  </div>
  <div class="footer">LASTPROOF by <a href="https://lastshift.ai">lastshift.ai</a></div>
</div>
</body>
</html>
