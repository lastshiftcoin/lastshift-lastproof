<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LASTPROOF — Dashboard Message Board (wireframe v0.2)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════════════════
     LASTPROOF — Dashboard Message Board (wireframe v0.2)

     Lives directly under StatusBar on the dashboard. Strictly an
     ANNOUNCEMENTS surface — company-broadcast messages only. No
     personalized nudges, no action CTAs.

     Anatomy:
       - Section header: [Notes icon] MESSAGE BOARD
       - Stacked message cards below (1..N visible)
       - Each card: title + subtext + optional date stamp + dismiss

     Color dot signals category:
       orange (--accent) = general / default
       green             = positive news (launches, features)
       gold              = founder/EA-specific
       red               = critical / alert (downtime, warning)
       purple            = upgrade / premium-related

     Wireframe-only state toggle at the bottom cycles through example
     fill states.
     ═══════════════════════════════════════════════════════════════════════ */
  :root {
    --bg:#0a0b0f;--bg-2:#12131a;--bg-card:#161822;--bg-input:#1a1c28;
    --border:#1e2030;--border-2:#2a2d42;
    --text:#e2e4ed;--text-2:#8b8fa3;--text-dim:#5a5e73;
    --accent:#ff9100;--green:#00e676;--red:#ff5470;--gold:#ffd700;--purple:#a78bfa;
    --green-dim:rgba(0,230,118,.1);--orange-dim:rgba(255,145,0,.1);
    --gold-dim:rgba(255,215,0,.1);--purple-dim:rgba(167,139,250,.1);
    --red-dim:rgba(255,84,112,.1);
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --sans:'Inter',-apple-system,sans-serif;
    --r-card:8px;--r-btn:6px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(30,32,48,.35) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,32,48,.35) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
  body::after {
    content: ""; position: fixed;
    top: -200px; right: -200px; width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(255,145,0,.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px);
    pointer-events: none; z-index: 9999;
  }
  .shell { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 28px 32px 80px; }

  /* ═══ FAUX STATUSBAR (just so the message board has spatial context) ═══ */
  .fake-status-bar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 16px; margin-bottom: 14px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-card);
  }
  .fake-status-bar .fsb-key {
    font-family: var(--mono); font-size: 9px; color: var(--text-dim);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .fake-status-bar .fsb-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 11px; background: var(--green-dim); border: 1px solid var(--green);
    border-radius: var(--r-btn);
    font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    color: var(--green); text-transform: uppercase;
  }
  .fake-status-bar .fsb-pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  }
  .fake-status-bar .fsb-spacer { flex: 1; }
  .fake-status-bar .fsb-cta {
    font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    padding: 8px 14px; background: var(--accent); color: #0a0b0f;
    border: none; border-radius: var(--r-btn); cursor: pointer; text-transform: uppercase;
  }

  /* ═══ MESSAGE BOARD ═══ */
  .mb-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-card);
    padding: 16px 18px 12px; margin-bottom: 14px;
  }
  .mb-header {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 12px; margin-bottom: 12px;
    border-bottom: 1px dashed var(--border);
  }
  .mb-header-icon {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--orange-dim); border: 1px solid rgba(255,145,0,.4);
    border-radius: var(--r-btn);
    color: var(--accent);
  }
  .mb-header-icon svg { width: 14px; height: 14px; }
  .mb-header-title {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    color: var(--text); letter-spacing: 1.5px; text-transform: uppercase;
  }
  /* Message list */
  .mb-list { display: flex; flex-direction: column; gap: 10px; }
  .mb-msg {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,.015);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent); /* category color, overridden per variant */
    border-radius: var(--r-btn);
    position: relative;
    transition: border-color .15s, background .15s;
  }
  .mb-msg:hover { background: rgba(255,255,255,.03); }
  .mb-msg-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .mb-msg-meta {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-dim);
  }
  .mb-msg-tag { color: var(--accent); }
  .mb-msg-title {
    font-family: var(--sans); font-size: 14px; font-weight: 700;
    color: var(--text); line-height: 1.35; margin: 0;
  }
  .mb-msg-sub {
    font-family: var(--sans); font-size: 12px;
    color: var(--text-2); line-height: 1.55; margin: 2px 0 0;
  }
  .mb-msg-dismiss {
    flex-shrink: 0;
    font-family: var(--mono); font-size: 16px; line-height: 1;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--text-dim);
    border: 1px solid transparent; border-radius: var(--r-btn); cursor: pointer;
    transition: all .12s;
  }
  .mb-msg:hover .mb-msg-dismiss { border-color: var(--border); }
  .mb-msg-dismiss:hover { color: var(--text); border-color: var(--text-dim) !important; }

  /* Color variants */
  .mb-msg.mb-green { border-left-color: var(--green); }
  .mb-msg.mb-green .mb-msg-tag { color: var(--green); }
  .mb-msg.mb-gold { border-left-color: var(--gold); }
  .mb-msg.mb-gold .mb-msg-tag { color: var(--gold); }
  .mb-msg.mb-red { border-left-color: var(--red); }
  .mb-msg.mb-red .mb-msg-tag { color: var(--red); }
  .mb-msg.mb-purple { border-left-color: var(--purple); }
  .mb-msg.mb-purple .mb-msg-tag { color: var(--purple); }

  /* Empty state */
  .mb-empty {
    padding: 22px 14px;
    text-align: center;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
  }
  .mb-empty::before {
    content: ""; display: block;
    width: 32px; height: 32px; margin: 0 auto 10px;
    background: var(--orange-dim); border: 1px solid rgba(255,145,0,.3);
    border-radius: 50%;
    -webkit-mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/%3E%3Cpolyline points='14 2 14 8 20 8'/%3E%3C/svg%3E") center / 16px no-repeat;
            mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/%3E%3Cpolyline points='14 2 14 8 20 8'/%3E%3C/svg%3E") center / 16px no-repeat;
    background-color: var(--accent);
  }

  /* ═══ FAUX REST OF DASHBOARD (so the strip sits in context) ═══ */
  .fake-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px;
  }
  .fake-stat {
    padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--r-btn);
  }
  .fake-stat .fk { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .fake-stat .fv { font-family: var(--mono); font-size: 22px; font-weight: 700; color: #fff; }

  /* ═══ WIREFRAME-ONLY STATE TOGGLE (NOT shipped) ═══ */
  .wf-toggle {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 10000; display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; background: rgba(10,11,15,.92);
    border: 1px dashed var(--border-2); border-radius: 8px;
    backdrop-filter: blur(6px);
    max-width: calc(100vw - 28px); overflow-x: auto;
  }
  .wf-toggle .lbl {
    font-family: var(--mono); font-size: 8px; color: var(--text-dim);
    letter-spacing: 1.5px; text-transform: uppercase;
    padding-right: 6px; border-right: 1px solid var(--border-2); margin-right: 2px;
    white-space: nowrap;
  }
  .wf-toggle button {
    background: transparent; border: 1px solid var(--border-2); color: var(--text-dim);
    font-family: var(--mono); font-size: 9px; letter-spacing: .8px;
    padding: 5px 9px; border-radius: 4px; cursor: pointer;
    text-transform: uppercase; white-space: nowrap;
  }
  .wf-toggle button.active {
    color: var(--accent); border-color: var(--accent); background: var(--orange-dim);
  }

  @media (max-width: 720px) {
    .shell { padding: 18px 14px 80px; }
    .fake-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="scanlines" aria-hidden="true"></div>

<div class="shell">

  <!-- Faux StatusBar so the message board sits in context -->
  <div class="fake-status-bar">
    <span class="fsb-key">Profile Status</span>
    <span class="fsb-pill"><span class="dot"></span>ACTIVE</span>
    <span class="fsb-spacer"></span>
    <button class="fsb-cta">UPGRADE PROFILE</button>
  </div>

  <!-- ═══ MESSAGE BOARD ═══ -->
  <div class="mb-card">
    <div class="mb-header">
      <span class="mb-header-icon">
        <!-- Notes / clipboard icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
      </span>
      <span class="mb-header-title">LASTPROOF ANNOUNCEMENTS</span>
    </div>
    <div class="mb-list" id="mb-list"></div>
  </div>

  <!-- Faux rest of dashboard (stat strip) so the message board lands in context -->
  <div class="fake-grid">
    <div class="fake-stat"><div class="fk">PROOFS</div><div class="fv">12</div></div>
    <div class="fake-stat"><div class="fk">DEV</div><div class="fv">2</div></div>
    <div class="fake-stat"><div class="fk">TIER</div><div class="fv">2</div></div>
    <div class="fake-stat"><div class="fk">ARMY</div><div class="fv">14</div></div>
  </div>

</div>

<!-- ═══ WIREFRAME-ONLY STATE TOGGLE (NOT SHIPPED) ═══ -->
<div class="wf-toggle">
  <span class="lbl">WIREFRAME · STATE</span>
  <button data-state="three" class="active">3 MESSAGES</button>
  <button data-state="one">1 MESSAGE</button>
  <button data-state="critical">CRITICAL ONLY</button>
  <button data-state="empty">EMPTY</button>
</div>

<script>
(function(){
  /* Sample announcements pool. Each: { color, tag, title, sub }
     - color: '' (orange default) | 'mb-green' | 'mb-gold' | 'mb-red' | 'mb-purple'
     - tag: short eyebrow label
  */
  var ALL = {
    grid: {
      color: 'mb-green',
      tag: 'LAUNCH',
      title: 'The Grid is now open.',
      sub: 'Find operators, get found, get hired.'
    },
    chad: {
      color: 'mb-green',
      tag: 'NEW FEATURE',
      title: 'Chad Function is live.',
      sub: 'Build your social proof network — send and receive chad asks from any operator on the Grid.'
    },
    forever: {
      color: 'mb-gold',
      tag: 'FOUNDING 5,000',
      title: 'First 5,000 profiles are now free forever.',
      sub: 'No 30-day timer. No auto-conversion. Claim your spot before the cap closes.'
    },
    maintenance: {
      color: 'mb-red',
      tag: 'MAINTENANCE',
      title: 'Scheduled downtime — 15 min window.',
      sub: 'Profile actions and proof submissions will be unavailable during the window.'
    }
  };

  /* States — which messages render in each example */
  var STATES = {
    'three':    ['grid', 'chad', 'forever'],
    'one':      ['grid'],
    'critical': ['maintenance'],
    'empty':    []
  };

  function render(state) {
    var keys = STATES[state] || [];
    var list = document.getElementById('mb-list');
    if (keys.length === 0) {
      list.innerHTML = '<div class="mb-empty">No announcements right now</div>';
      return;
    }
    var html = keys.map(function(k) {
      var m = ALL[k];
      return '' +
        '<div class="mb-msg ' + (m.color || '') + '">' +
        '  <div class="mb-msg-body">' +
        '    <div class="mb-msg-meta">' +
        '      <span class="mb-msg-tag">' + m.tag + '</span>' +
        '    </div>' +
        '    <h3 class="mb-msg-title">' + m.title + '</h3>' +
        '    <p class="mb-msg-sub">' + m.sub + '</p>' +
        '  </div>' +
        '  <button class="mb-msg-dismiss" title="Dismiss" onclick="return false;">×</button>' +
        '</div>';
    }).join('');
    list.innerHTML = html;
  }

  /* Initial render */
  render('three');

  /* Toggle wiring */
  document.querySelectorAll('.wf-toggle button').forEach(function(b) {
    b.addEventListener('click', function() {
      document.querySelectorAll('.wf-toggle button').forEach(function(x) { x.classList.remove('active'); });
      b.classList.add('active');
      render(b.dataset.state);
    });
  });
})();
</script>

</body>
</html>
